<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
<style>
.node{fill:#00ffff;animation:pulse 2s infinite;}
.line{stroke:#00ffff;stroke-width:1.5;opacity:.6;}
@keyframes pulse{
0%{r:4}
50%{r:7}
100%{r:4}
}
</style>

<circle class="node" cx="100" cy="80" r="4"/>
<circle class="node" cx="100" cy="160" r="4"/>
<circle class="node" cx="100" cy="240" r="4"/>

<circle class="node" cx="300" cy="120" r="4"/>
<circle class="node" cx="300" cy="200" r="4"/>

<circle class="node" cx="500" cy="160" r="4"/>

<line class="line" x1="100" y1="80" x2="300" y2="120"/>
<line class="line" x1="100" y1="160" x2="300" y2="120"/>
<line class="line" x1="100" y1="240" x2="300" y2="200"/>
<line class="line" x1="300" y1="120" x2="500" y2="160"/>
<line class="line" x1="300" y1="200" x2="500" y2="160"/>
</svg>
